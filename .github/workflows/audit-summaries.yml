name: Audit Summaries

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run summary audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/audit-summaries.js

      - name: Commit if flagged
        run: |
          git add data/summaries.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git config user.name "Hermes Atlas Bot"
            git config user.email "bot@hermesatlas.com"
            git commit -m "Audit: flag stale/hallucinated summaries for regeneration"
            git push
          fi
